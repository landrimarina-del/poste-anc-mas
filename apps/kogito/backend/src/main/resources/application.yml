# Configurazione comune (default = profilo local).
# Profili previsti: local, poc, target. Sprint 0 usa local/poc.
spring:
  application:
    name: anc-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    # Flyway deve sempre usare MariaDB (ANC datasource), non il PostgreSQL di Kogito
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3307/anc?useSSL=false&allowPublicKeyRetrieval=true}
    user: ${SPRING_DATASOURCE_USERNAME:anc}
    password: ${SPRING_DATASOURCE_PASSWORD:anc}
    # classpath:db/migration -> Java migration V2 (seed utenti demo)
    # filesystem -> migrazioni SQL versionate, source-of-truth in /infra/db/migrations
    locations: classpath:db/migration,filesystem:${ANC_FLYWAY_SQL_LOCATION:./infra/db/migrations}

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Datasource dedicato per Kogito process persistence (PostgreSQL).
# Il bean kogitoDataSource in KogitoDataSourceConfig legge questo prefisso.
kogito:
  datasource:
    jdbc-url: ${KOGITO_DATASOURCE_URL:jdbc:postgresql://localhost:5433/kogito}
    username: ${KOGITO_DATASOURCE_USERNAME:kogito}
    password: ${KOGITO_DATASOURCE_PASSWORD:kogito}
    driver-class-name: org.postgresql.Driver
  persistence:
    type: jdbc
  # URL esposto da questo servizio (usato da Management Console per operazioni dirette)
  service:
    url: ${KOGITO_SERVICE_URL:http://localhost:8081}
  # Data Index: URL dove il runtime pubblica i CloudEvents di processo
  dataindex:
    http:
      url: ${KOGITO_DATAINDEX_HTTP_URL:http://localhost:8082}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

anc:
  security:
    bpm:
      inbound:
        api-key: ${ANC_BPM_INBOUND_API_KEY:}
        header-name: ${ANC_BPM_INBOUND_HEADER_NAME:X-SD-API-Key}
  bpm:
    outbound:
      url: ${ANC_BPM_OUTBOUND_URL:http://localhost:18080/bpm-stub/outcome}

logging:
  level:
    root: INFO
    it.poste.anc: DEBUG
    org.springframework.security: DEBUG
    org.kie.kogito: DEBUG
