# Configurazione comune (default = profilo local).
# Profili previsti: local, poc, target. Sprint 0 usa local/poc.
spring:
  application:
    name: anc-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    # classpath:db/migration -> Java migration V2 (seed utenti demo)
    # filesystem -> migrazioni SQL versionate, source-of-truth in /infra/db/migrations
    locations: classpath:db/migration,filesystem:${ANC_FLYWAY_SQL_LOCATION:./infra/db/migrations}

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Datasource dedicato per le tabelle Flowable (schema "flowable", separato da "anc").
# Il bean flowableDataSource in FlowableEngineConfig legge questo prefisso.
anc:
  flowable:
    datasource:
      jdbc-url: ${ANC_FLOWABLE_DATASOURCE_URL:jdbc:mariadb://localhost:3307/flowable?useSSL=false&allowPublicKeyRetrieval=true}
      username: ${ANC_FLOWABLE_DATASOURCE_USERNAME:anc}
      password: ${ANC_FLOWABLE_DATASOURCE_PASSWORD:anc}
      driver-class-name: org.mariadb.jdbc.Driver
  security:
    bpm:
      inbound:
        api-key: ${ANC_BPM_INBOUND_API_KEY:}
        header-name: ${ANC_BPM_INBOUND_HEADER_NAME:X-SD-API-Key}
  bpm:
    outbound:
      url: ${ANC_BPM_OUTBOUND_URL:http://localhost:18080/bpm-stub/outcome}

flowable:
  database-schema-update: true
  async-executor-activate: false
  check-process-definitions: true
  process-definition-location-prefix: classpath:/processes/
  process-definition-location-suffixes:
    - '**.bpmn20.xml'
    - '**.bpmn'

logging:
  level:
    root: INFO
    it.poste.anc: DEBUG
    org.springframework.security: DEBUG
    org.flowable.rest: DEBUG
