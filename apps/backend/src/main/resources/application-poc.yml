# Profilo POC: backend in container, DB risolto via service name docker-compose.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://db:3306/anc?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:anc}
    password: ${SPRING_DATASOURCE_PASSWORD:anc}
    driver-class-name: org.mariadb.jdbc.Driver

# GAP-BLOCKER-001 (Sprint 4): trasporto allegati BPM via metadata + pull-through
# sincrono su MinIO. Tutte le proprieta' sono override-abili via variabili d'ambiente
# valorizzate da docker-compose.
anc:
  attachment:
    allowlist-hosts: ${ANC_ATTACHMENT_ALLOWLIST_HOSTS:bpm-stub}
    max-bytes: ${ANC_ATTACHMENT_MAX_BYTES:26214400}
    pull-timeout-ms: ${ANC_ATTACHMENT_PULL_TIMEOUT_MS:5000}
    storage:
      endpoint: ${ANC_ATTACHMENT_STORAGE_ENDPOINT:http://minio:9000}
      region: ${ANC_ATTACHMENT_STORAGE_REGION:us-east-1}
      bucket: ${ANC_ATTACHMENT_STORAGE_BUCKET:anc-attachments}
      access-key: ${ANC_ATTACHMENT_STORAGE_ACCESS_KEY:anc}
      secret-key: ${ANC_ATTACHMENT_STORAGE_SECRET_KEY:anc-poc-minio-secret}
