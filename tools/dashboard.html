<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ANC — Scrivania Digitale · Dashboard Pratiche</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #003087 0%, #0050b3 100%);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    header .logo { display: flex; align-items: center; gap: 14px; }
    header .logo .badge {
      background: #ffb300;
      color: #003087;
      font-weight: 800;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 1px;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
    header .subtitle { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    header .refresh-area { display: flex; align-items: center; gap: 12px; }
    header .last-update { font-size: 12px; opacity: 0.7; }
    #btn-refresh {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      padding: 7px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    #btn-refresh:hover { background: rgba(255,255,255,0.28); }

    /* STATS */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 20px 32px 0;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 24px;
      flex: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat-icon { font-size: 28px; }
    .stat-value { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 12px; color: #718096; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-active .stat-value { color: #38a169; }
    .stat-completed .stat-value { color: #3182ce; }
    .stat-error .stat-value { color: #e53e3e; }
    .stat-total .stat-value { color: #003087; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 10px;
      padding: 20px 32px 0;
      align-items: center;
      flex-wrap: wrap;
    }
    .filters input, .filters select {
      padding: 8px 14px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      color: #2d3748;
    }
    .filters input { width: 220px; }
    .filter-label { font-size: 13px; color: #718096; font-weight: 600; }

    /* TABLE */
    .table-container {
      margin: 20px 32px 32px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead tr { background: #003087; color: #fff; }
    thead th { padding: 13px 18px; text-align: left; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    tbody tr { border-bottom: 1px solid #edf2f7; transition: background 0.15s; cursor: pointer; }
    tbody tr:hover { background: #ebf4ff; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 14px 18px; vertical-align: middle; }

    .badge-state {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .state-ACTIVE    { background: #c6f6d5; color: #276749; }
    .state-COMPLETED { background: #bee3f8; color: #2a4365; }
    .state-ABORTED   { background: #fed7d7; color: #742a2a; }
    .state-ERROR     { background: #fed7d7; color: #742a2a; }
    .state-PENDING   { background: #fefcbf; color: #744210; }
    .state-SUSPENDED { background: #e2e8f0; color: #4a5568; }

    .business-key {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: 700;
      color: #003087;
      background: #ebf4ff;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .process-id { font-size: 13px; color: #718096; }
    .id-short {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #a0aec0;
    }
    .date-cell { font-size: 12px; color: #718096; }

    /* DETAIL PANEL */
    .detail-panel {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 420px;
      background: #fff;
      box-shadow: -4px 0 24px rgba(0,0,0,0.15);
      z-index: 100;
      overflow-y: auto;
    }
    .detail-panel.open { display: block; }
    .detail-header {
      background: #003087;
      color: #fff;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .detail-header h2 { font-size: 16px; font-weight: 700; }
    .detail-header .close-btn {
      background: none; border: none; color: #fff; font-size: 22px;
      cursor: pointer; line-height: 1; opacity: 0.8;
    }
    .detail-header .close-btn:hover { opacity: 1; }
    .detail-body { padding: 24px; }
    .detail-section { margin-bottom: 24px; }
    .detail-section h3 {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #718096; margin-bottom: 12px;
      padding-bottom: 6px; border-bottom: 1px solid #edf2f7;
    }
    .detail-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
    .detail-key { font-size: 12px; color: #718096; width: 120px; flex-shrink: 0; padding-top: 2px; }
    .detail-val { font-size: 13px; color: #2d3748; font-weight: 500; word-break: break-all; }
    .variables-pre {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      color: #2d3748;
      max-height: 300px;
      overflow-y: auto;
    }

    /* LOADING / EMPTY */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #718096;
      font-size: 15px;
    }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid #bee3f8;
      border-top-color: #003087;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 99;
    }
    .overlay.open { display: block; }

    .error-banner {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #742a2a;
      border-radius: 8px;
      padding: 14px 20px;
      margin: 20px 32px 0;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="badge">ANC</div>
    <div>
      <h1>Scrivania Digitale — Dashboard Pratiche</h1>
      <div class="subtitle">Monitoraggio Workflow BPM · Kogito Data Index</div>
    </div>
  </div>
  <div class="refresh-area">
    <span class="last-update" id="last-update">–</span>
    <button id="btn-refresh" onclick="loadData()">⟳ Aggiorna</button>
  </div>
</header>

<div id="error-banner" class="error-banner" style="display:none"></div>

<div class="stats-bar">
  <div class="stat-card stat-total">
    <div class="stat-icon">📋</div>
    <div><div class="stat-value" id="stat-total">–</div><div class="stat-label">Totale Pratiche</div></div>
  </div>
  <div class="stat-card stat-active">
    <div class="stat-icon">🟢</div>
    <div><div class="stat-value" id="stat-active">–</div><div class="stat-label">In Lavorazione</div></div>
  </div>
  <div class="stat-card stat-completed">
    <div class="stat-icon">✅</div>
    <div><div class="stat-value" id="stat-completed">–</div><div class="stat-label">Completate</div></div>
  </div>
  <div class="stat-card stat-error">
    <div class="stat-icon">🔴</div>
    <div><div class="stat-value" id="stat-error">–</div><div class="stat-label">Errore / Sospese</div></div>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filtri:</span>
  <input type="text" id="filter-search" placeholder="Cerca per pratica, ID..." oninput="renderTable()" />
  <select id="filter-state" onchange="renderTable()">
    <option value="">Tutti gli stati</option>
    <option value="ACTIVE">In Lavorazione</option>
    <option value="COMPLETED">Completate</option>
    <option value="ABORTED">Annullate</option>
    <option value="ERROR">Errore</option>
    <option value="SUSPENDED">Sospese</option>
  </select>
</div>

<div class="table-container">
  <div id="table-loading" class="loading">
    <div class="spinner"></div><br>Caricamento pratiche...
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th>Pratica</th>
        <th>Processo</th>
        <th>Stato</th>
        <th>Avvio</th>
        <th>Fine</th>
        <th>ID Istanza</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div>
      <div style="font-size:12px;opacity:0.7;margin-bottom:4px">DETTAGLIO PRATICA</div>
      <h2 id="detail-title">–</h2>
    </div>
    <button class="close-btn" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
  const ENDPOINT = 'http://localhost:8082/graphql';
  const QUERY = `{
    ProcessInstances {
      id
      processId
      processName
      state
      start
      end
      businessKey
      variables
    }
  }`;

  let allData = [];

  function stateLabel(s) {
    return { ACTIVE: 'In Lavorazione', COMPLETED: 'Completata', ABORTED: 'Annullata', ERROR: 'Errore', SUSPENDED: 'Sospesa', PENDING: 'In Attesa' }[s] || s;
  }

  function formatDate(d) {
    if (!d) return '<span style="color:#a0aec0">—</span>';
    try {
      return new Date(d).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } catch(e) { return d; }
  }

  async function loadData() {
    document.getElementById('table-loading').style.display = 'block';
    document.getElementById('main-table').style.display = 'none';
    document.getElementById('error-banner').style.display = 'none';

    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ query: QUERY })
      });
      const json = await res.json();
      if (json.errors && (!json.data || !json.data.ProcessInstances)) {
        throw new Error(json.errors[0].message);
      }
      allData = (json.data && json.data.ProcessInstances) || [];
      updateStats();
      renderTable();
      document.getElementById('last-update').textContent = 'Aggiornato: ' + new Date().toLocaleTimeString('it-IT');
    } catch(e) {
      document.getElementById('table-loading').style.display = 'none';
      document.getElementById('error-banner').style.display = 'block';
      document.getElementById('error-banner').textContent = '⚠ Impossibile connettersi al Data Index: ' + e.message;
    }
  }

  function updateStats() {
    const counts = allData.reduce((a, p) => { a[p.state] = (a[p.state]||0)+1; return a; }, {});
    document.getElementById('stat-total').textContent = allData.length;
    document.getElementById('stat-active').textContent = counts['ACTIVE'] || 0;
    document.getElementById('stat-completed').textContent = counts['COMPLETED'] || 0;
    document.getElementById('stat-error').textContent = (counts['ERROR']||0) + (counts['ABORTED']||0) + (counts['SUSPENDED']||0);
  }

  function renderTable() {
    const search = document.getElementById('filter-search').value.toLowerCase();
    const stateFilter = document.getElementById('filter-state').value;

    let rows = allData.filter(p => {
      const matchSearch = !search ||
        (p.businessKey && p.businessKey.toLowerCase().includes(search)) ||
        (p.id && p.id.toLowerCase().includes(search)) ||
        (p.processName && p.processName.toLowerCase().includes(search));
      const matchState = !stateFilter || p.state === stateFilter;
      return matchSearch && matchState;
    });

    // Ordina per businessKey
    rows.sort((a, b) => (a.businessKey || a.id).localeCompare(b.businessKey || b.id));

    const tbody = document.getElementById('table-body');
    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#a0aec0;padding:40px">Nessuna pratica trovata</td></tr>';
    } else {
      tbody.innerHTML = rows.map(p => `
        <tr onclick="showDetail('${p.id}')">
          <td><span class="business-key">${p.businessKey || '—'}</span></td>
          <td><span class="process-id">${p.processName || p.processId}</span></td>
          <td><span class="badge-state state-${p.state}">${stateLabel(p.state)}</span></td>
          <td class="date-cell">${formatDate(p.start)}</td>
          <td class="date-cell">${formatDate(p.end)}</td>
          <td class="id-short">${p.id ? p.id.substring(0,18)+'…' : '—'}</td>
        </tr>
      `).join('');
    }

    document.getElementById('table-loading').style.display = 'none';
    document.getElementById('main-table').style.display = 'table';
  }

  function showDetail(id) {
    const p = allData.find(x => x.id === id);
    if (!p) return;

    document.getElementById('detail-title').textContent = p.businessKey || p.id;

    let vars = '';
    if (p.variables) {
      try { vars = JSON.stringify(JSON.parse(p.variables), null, 2); }
      catch(e) { vars = p.variables; }
    }

    document.getElementById('detail-body').innerHTML = `
      <div class="detail-section">
        <h3>Informazioni Pratica</h3>
        <div class="detail-row"><span class="detail-key">Pratica</span><span class="detail-val"><span class="business-key">${p.businessKey || '—'}</span></span></div>
        <div class="detail-row"><span class="detail-key">Stato</span><span class="detail-val"><span class="badge-state state-${p.state}">${stateLabel(p.state)}</span></span></div>
        <div class="detail-row"><span class="detail-key">Processo</span><span class="detail-val">${p.processName || p.processId}</span></div>
      </div>
      <div class="detail-section">
        <h3>Date</h3>
        <div class="detail-row"><span class="detail-key">Avvio</span><span class="detail-val">${p.start ? formatDate(p.start) : 'Non disponibile'}</span></div>
        <div class="detail-row"><span class="detail-key">Fine</span><span class="detail-val">${p.end ? formatDate(p.end) : '—'}</span></div>
      </div>
      <div class="detail-section">
        <h3>Identificativo</h3>
        <div class="detail-row"><span class="detail-key">Instance ID</span><span class="detail-val" style="font-family:monospace;font-size:11px">${p.id}</span></div>
        <div class="detail-row"><span class="detail-key">Process ID</span><span class="detail-val">${p.processId}</span></div>
      </div>
      ${vars ? `<div class="detail-section"><h3>Variabili</h3><pre class="variables-pre">${vars}</pre></div>` : ''}
    `;

    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('overlay').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  // Auto-refresh ogni 30 secondi
  loadData();
  setInterval(loadData, 30000);
</script>
</body>
</html>
